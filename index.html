<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교내 생활 지도 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">

    <!-- Header -->
    <div class="header">
      <div class="header-badge">
        <span class="icon">🏫</span>
        <h1>교내 생활 지도 관리</h1>
      </div>
      <p class="header-sub">학생 생활 지도 기록 시스템</p>
    </div>

    <div class="divider"><span>학생 정보</span></div>

    <!-- 학생 기본 정보 -->
    <div class="card" style="animation-delay:0.05s">
      <div class="input-group">
        <label>학번</label>
        <input type="text" placeholder="학번을 입력하세요." />
      </div>
    </div>

    <div class="divider"><span>지도 항목</span></div>

    <!-- 복장 단속 -->
    <div class="section-card" style="animation-delay:0.10s">
      <div class="section-title">
        <span class="dot"></span>
        복장 단속
      </div>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <input type="checkbox" />
          <span class="checkbox-box"></span>
          <span class="checkbox-label">교복 미착용 및 교복 변형</span>
        </label>
        <label class="checkbox-item">
          <input type="checkbox" />
          <span class="checkbox-box"></span>
          <span class="checkbox-label">실내화 등교</span>
        </label>
        <div class="other-checkbox-wrap">
          <label class="checkbox-item other-top" onclick="toggleOther(this, 'other-bokjang')">
            <input type="checkbox" />
            <span class="checkbox-box"></span>
            <span class="checkbox-label">기타</span>
          </label>
          <div class="other-input-wrap" id="other-bokjang">
            <textarea class="other-input" placeholder="기타 내용을 자세히 입력하세요..."></textarea>
          </div>
        </div>
      </div>
    </div>
 
    <!-- 전자기기 위반 -->
    <div class="section-card" style="animation-delay:0.15s">
      <div class="section-title">
        <span class="dot"></span>
        전자기기 위반
      </div>
      <div class="checkbox-grid">
        <div class="checkbox-row">
          <label class="checkbox-item">
            <input type="checkbox" />
            <span class="checkbox-box"></span>
            <span class="checkbox-label">무단 전자기기 사용</span>
          </label>
        </div>
        <div class="other-checkbox-wrap">
          <label class="checkbox-item other-top" onclick="toggleOther(this, 'other-elec')">
            <input type="checkbox" />
            <span class="checkbox-box"></span>
            <span class="checkbox-label">기타</span>
          </label>
          <div class="other-input-wrap" id="other-elec">
            <textarea class="other-input" placeholder="기타 내용을 자세히 입력하세요..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- 생활 태도 -->

      <div class="section-title">
        <span class="dot"></span>

        </label>
        <label class="checkbox-item">

        <div class="memo-label">메모</div>
        <textarea placeholder="세부 내용을 입력하세요..."></textarea>
      </div>
    </div> -->

    <!-- Save -->
    <button class="btn-save" onclick="handleSave()">저 장</button>
  </div>

  <div class="toast" id="toast">✅ 지도 내용이 저장되었습니다.</div>

  <script src="script.js"></script>
</body>
</html>
